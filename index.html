<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa da Mia - Solidariedade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        .hero-gradient { background: linear-gradient(180deg, #fdf2f8 0%, #f3e8ff 100%); }
        .num-btn { width: 100%; aspect-ratio: 1; border-radius: 8px; font-size: 0.75rem; font-weight: bold; transition: all 0.2s; border: 1px solid #e5e7eb; }
        .verde { background-color: #dcfce7; color: #166534; }
        .vermelho { background-color: #fee2e2; color: #991b1b; cursor: not-allowed; }
        .selecionado { background-color: #a855f7; color: white; transform: scale(1.1); }
        .btn-primary-custom { background: linear-gradient(90deg, #ec4899, #a855f7); color: white; padding: 12px 24px; border-radius: 9999px; font-weight: bold; transition: all 0.2s; display: inline-block; }
        .modal-slide-up { background: white; width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 24px; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
        @media (min-width: 640px) { .modal-slide-up { border-radius: 24px; margin-bottom: 0; } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const TOTAL_NUMBERS = 300;
        const PRIZE_DESCRIPTION = "Gift Card Shopee R$300";
        const PIX_KEY = "14184167705";
        const WHATSAPP_NUMBER = "55229921191137";
        const MIA_PHOTO = "https://images.unsplash.com/photo-1548247416-ec66f4900b2e?auto=format&fit=crop&q=80&w=800";

        function App() {
            const [selectedNumbers, setSelectedNumbers] = useState([]);
            const [paidNumbers, setPaidNumbers] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [userName, setUserName] = useState('');
            const [userWhatsapp, setUserWhatsapp] = useState('');

            const calculateTotal = useMemo(() => {
                const count = selectedNumbers.length;
                const groupsOfThree = Math.floor(count / 3);
                const individualOnes = count % 3;
                return (groupsOfThree * 25) + (individualOnes * 10);
            }, [selectedNumbers]);

            const handleNumberClick = (num) => {
                if (paidNumbers.includes(num)) return;
                setSelectedNumbers(prev => prev.includes(num) ? prev.filter(n => n !== num) : [...prev, num]);
            };

            const handleFinalReserve = () => {
                const msg = `Olá! Quero reservar os números ${selectedNumbers.join(', ')}. Total: R$${calculateTotal}.`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="min-h-screen pb-40">
                    <section className="hero-gradient pt-10 pb-8 px-5 text-center">
                        <img src={MIA_PHOTO} className="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-white shadow-lg object-cover" />
                        <h1 className="text-2xl font-bold text-purple-900 mb-2">Rifa solidária para a Mia ❤️</h1>
                        <p className="text-gray-600 mb-4">Ajude a custear a endoscopia da Mia. Cada número conta!</p>
                        <div className="inline-block bg-white px-4 py-2 rounded-full shadow-sm text-purple-700 font-bold mb-6">
                            🎁 Prêmio: {PRIZE_DESCRIPTION}
                        </div>
                    </section>

                    <section className="max-w-[600px] mx-auto px-5 mt-8">
                        <div className="grid grid-cols-5 sm:grid-cols-10 gap-2">
                            {Array.from({ length: TOTAL_NUMBERS }, (_, i) => i + 1).map(num => (
                                <button key={num} onClick={() => handleNumberClick(num)} 
                                    className={`num-btn ${selectedNumbers.includes(num) ? 'selecionado' : 'verde'}`}>
                                    {num}
                                </button>
                            ))}
                        </div>
                    </section>

                    <AnimatePresence>
                        {selectedNumbers.length > 0 && (
                            <motion.div initial={{ y: 100 }} animate={{ y: 0 }} exit={{ y: 100 }} className="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl border-t z-40">
                                <div className="max-w-[500px] mx-auto flex justify-between items-center mb-4">
                                    <div>
                                        <p className="text-xs text-gray-500 uppercase font-bold">Total a pagar</p>
                                        <p className="text-2xl font-bold text-purple-600">R${calculateTotal},00</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(true)} className="btn-primary-custom">Confirmar →</button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
                            <div className="modal-slide-up">
                                <h2 className="text-xl font-bold mb-4">Finalizar Reserva</h2>
                                <p className="mb-4 text-gray-600">Chave PIX: <strong>{PIX_KEY}</strong></p>
                                <button onClick={handleFinalReserve} className="w-full btn-primary-custom mb-2">Enviar Comprovante via WhatsApp</button>
                                <button onClick={() => setIsModalOpen(false)} className="w-full py-2 text-gray-400 font-bold">Voltar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
